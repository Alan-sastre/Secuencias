<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Juego de Secuencias</title>
    <link rel="icon" href="./assets/logorobcodesolutions.ico">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        #game-container {
            width: min(100dvw, calc(100dvh * 2));
            height: min(100dvh, calc(100dvw / 2));
            max-width: 100dvw;
            max-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        @supports not (height: 100dvh) {
            #game-container {
                width: min(100vw, calc(100vh * 2));
                height: min(100vh, calc(100vw / 2));
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        canvas {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #turn {
            margin: 0;
            padding: 20px;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            z-index: 1000;
            text-align: center;
            box-sizing: border-box;
        }

        .custom-container-class {
            z-index: 999 !important;
        }

        .custom-popup-class {
            position: relative !important;
            max-width: 90% !important;
            font-size: 16px !important;
            padding: 20px !important;
            word-wrap: break-word !important;
            backdrop-filter: blur(10px) !important;
            margin: 1.25rem auto !important;
        }

        .custom-title-class {
            font-size: 20px !important;
            margin-bottom: 10px !important;
            word-wrap: break-word !important;
            color: #2c3e50 !important;
        }

        .custom-content-class {
            margin: 10px 0 !important;
            word-wrap: break-word !important;
            color: #34495e !important;
            line-height: 1.5 !important;
        }

        .custom-confirm-button-class {
            background: linear-gradient(145deg, #4CAF50, #45a049) !important;
            color: #fff !important;
            border: 0 !important;
            padding: 8px 20px !important;
            border-radius: 8px !important;
            font-size: 16px !important;
            cursor: pointer !important;
            margin-top: 15px !important;
            transition: all .3s ease !important;
            box-shadow: 0 4px 15px rgba(76, 175, 80, .3) !important;
        }

        .custom-confirm-button-class:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(76, 175, 80, .4) !important;
        }

        .custom-confirm-button-class:active {
            transform: translateY(1px) !important;
        }

        .swal2-container {
            z-index: 999 !important;
        }

        .swal2-popup {
            position: relative !important;
            border-radius: 15px !important;
            background: rgba(255, 255, 255, .95) !important;
            backdrop-filter: blur(10px) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .1) !important;
            border: 1px solid rgba(255, 255, 255, .2) !important;
        }

        .swal2-title {
            color: #2c3e50 !important;
            font-weight: 600 !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .1) !important;
        }

        .swal2-html-container {
            color: #34495e !important;
            line-height: 1.6 !important;
        }

        .swal2-icon {
            border: 0 !important;
            margin: 1.5em auto !important;
        }

        .swal2-timer-progress-bar {
            background: rgba(76, 175, 80, .5) !important;
        }

        .swal2-toast {
            background: rgba(255, 255, 255, .9) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .1) !important;
        }

        @media (max-width: 480px) {
            .custom-popup-class {
                font-size: 14px !important;
                padding: 15px !important;
                max-width: 85% !important;
            }

            .custom-title-class {
                font-size: 18px !important;
            }

            .custom-confirm-button-class {
                padding: 6px 16px !important;
                font-size: 14px !important;
            }

            .swal2-popup {
                padding: 15px !important;
                width: auto !important;
                margin: 10px !important;
            }

            .swal2-icon {
                transform: scale(.8) !important;
                margin: 1em auto !important;
            }
        }
    </style>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="turn">
        <p>Por favor, gira tu dispositivo a modo horizontal para jugar.</p>
    </div>
    <script type="module" src="game.js"></script>
    <script>
        function checkOrientation() {
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            const isMobile = window.innerWidth < 768;
            document.getElementById("turn").style.display = isPortrait && isMobile ? "flex" : "none";
        }

        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("DOMContentLoaded", checkOrientation);
    </script>
</body>

</html>
